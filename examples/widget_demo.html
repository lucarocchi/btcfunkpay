<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FunkPay Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 24px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }
    #funkpay { width: 380px; }
  </style>
</head>
<body>

  <h1>FunkPay Widget Demo</h1>

  <div id="funkpay"
       data-server="https://your-server.com/pay"
       data-currency="EUR"
       data-theme="auto"
       data-success-url="/"></div>
  <!-- data-success-url: where the browser goes when the user clicks "Done" after payment -->

  <script src="https://btcfunk.com/pay/funkpay.js"></script>
  <script>
    FunkPay.on('detected', function(payment) {
      console.log('Payment detected in mempool (0-conf):', payment);
    });
    FunkPay.on('confirmed', function(payment) {
      console.log('Payment confirmed on-chain:', payment);
    });
    FunkPay.on('expired', function(payment) {
      console.log('Invoice expired:', payment);
    });
  </script>

</body>
</html>
